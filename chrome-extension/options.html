<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design QA Options</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: #0b0c10;
        color: rgba(255, 255, 255, 0.92);
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 22px 16px;
        display: grid;
        gap: 12px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 6px;
      }
      .label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
      }
      .input {
        width: 100%;
        padding: 10px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.25);
        color: rgba(255, 255, 255, 0.92);
        outline: none;
      }
      .btn {
        width: fit-content;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
      }
      .muted {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.4;
      }
      .ok {
        font-size: 12px;
        color: rgba(82, 196, 26, 0.95);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Design QA Agent — Options</h1>
      <div class="muted">업로드/결과 오픈에 사용할 앱 URL(origin)을 설정합니다.</div>

      <div>
        <div class="label">App origin</div>
        <input id="origin" class="input" placeholder="http://localhost:3000" />
      </div>

      <button id="save" class="btn">Save</button>
      <div id="saved" class="ok"></div>
      <div class="muted">예: <span style="font-family: ui-monospace">http://localhost:3000</span></div>
    </div>
    <script type="module" src="options.js"></script>
  </body>
</html>
