<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M·ZER0</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        width: 320px;
        background: radial-gradient(600px 400px at 0% 0%, rgba(0, 77, 98, 0.5), transparent 70%),
          radial-gradient(500px 300px at 100% 60%, rgba(201, 246, 176, 0.15), transparent 70%),
          #0b0c10;
        color: rgba(255, 255, 255, 0.92);
      }
      .wrap {
        padding: 14px;
        display: grid;
        gap: 10px;
      }
      .title {
        font-weight: 500;
        font-size: 18px;
        letter-spacing: -0.03em;
        margin-bottom: 2px;
      }
      .btn {
        border: none;
        background: #C9F6B0;
        color: #0b0c10;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .muted {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.4;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        font-size: 12px;
      }
      .error {
        color: rgba(255, 77, 79, 0.95);
        font-size: 12px;
        white-space: pre-wrap;
      }
      .ok {
        color: #C9F6B0;
        font-size: 12px;
        white-space: pre-wrap;
      }
      a {
        color: rgba(201, 246, 176, 0.85);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">M·ZER0</div>
      <div class="muted">현재 탭에서 computed style을 추출해 앱으로 업로드 후 결과 페이지를 엽니다.</div>
      <select id="viewport" style="
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        outline: none;
      ">
        <option value="">As-is (현재 크기)</option>
        <optgroup label="Mobile — Small">
          <option value="320">320px · iPhone SE</option>
          <option value="375">375px · iPhone 6~8 / SE2~3</option>
        </optgroup>
        <optgroup label="Mobile — Medium">
          <option value="390">390px · iPhone 14/15/16 Pro</option>
          <option value="430">430px · iPhone Pro Max</option>
        </optgroup>
        <optgroup label="Tablet / Desktop">
          <option value="768">768px · iPad mini</option>
          <option value="1024">1024px · iPad / iPad Air</option>
          <option value="1440">1440px · Desktop</option>
        </optgroup>
      </select>
      <button id="run" class="btn">Extract & Upload</button>
      <div id="status" class="muted"></div>
      <div id="msg" class="mono"></div>
      <div id="err" class="error"></div>
      <div class="muted">
        앱 URL은 <a id="optionsLink" href="#">Options</a>에서 설정할 수 있어요.
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
